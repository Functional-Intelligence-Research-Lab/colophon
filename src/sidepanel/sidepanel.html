<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colophon</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=Edu+NSW+ACT+Cursive:wght@400..700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <header class="top-nav">
      <div class="brand">
        <svg class="logo" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.53c-.22-.38-.59-.68-1.04-.81l-1.47-.43c-.45-.13-.79-.53-.79-1v-1c0-.55-.45-1-1-1h-2v-2h2c.55 0 1-.45 1-1V9c0-.55-.45-1-1-1h-1.5l-2.4-2.4c.28-.04.57-.07.86-.07 4.97 0 9 4.03 9 9 0 1.48-.36 2.87-1 4.07z" />
        </svg>
        <h1>Colophon</h1>
      </div>
      <div class="nav-actions">
        <button class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg></button>
        <button class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h-8l-2 8h12l-2-8zM12 12v8" /></svg></button>
        <button class="icon-btn" id="close-panel-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12" /></svg></button>
      </div>
    </header>

    <div id="model-banner" class="model-banner" style="display:none"></div>

    <main class="scroll-container">
      <div class="project-context">
        <div class="context-header">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
            <polyline points="14 2 14 8 20 8" />
          </svg>
          <span>Project context</span>
        </div>
        <div class="context-card">
          <h3>Project Title</h3>
          <p>input prompt here</p>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6" /></svg>
        </div>
      </div>

      <div class="timeline" id="timeline-container">
        </div>

    </main>

    <div class="input-container">
      <div class="input-box">
        <input type="text" placeholder="Ask or reply..." />
        <button class="send-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7" /></svg>
        </button>
      </div>
    </div>

    <footer class="app-footer">
      <button class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18" /></svg></button>
      <div class="status"><span class="dot"></span> Local model</div>
      <button class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3" /></svg></button>
    </footer>
  </body>
  <script type="module" src="./sidepanel.js"></script>
</html>
