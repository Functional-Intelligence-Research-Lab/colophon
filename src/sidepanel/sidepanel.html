<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colophon</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="sp-header">
    <h1>Activity log</h1>
    <div id="session-id" class="sp-session"></div>
  </div>

  <div class="sp-summary" id="summary">
    <span id="chip-recording" class="chip">Recording</span>
    <span id="chip-count" class="chip chip--muted">0 events</span>
    <span id="chip-duration" class="chip chip--muted">0:00</span>
  </div>

  <ul class="sp-timeline" id="timeline">
    <li class="sp-empty" id="empty">No activity yet. Start recording to begin.</li>
  </ul>

  <footer class="sp-footer">
    <span>Private and local</span>
    <a href="https://github.com/Functional-Intelligence-Research-Lab/twff" target="_blank" rel="noreferrer">TWFF</a>
  </footer>

  <script src="sidepanel.js"></script>
</body>
</html>
