<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colophon</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup-shell">
    <header class="topbar">
      <h1 id="doc-title">Untitled document</h1> 
      <div class="tooltip-container">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="tooltip-icon">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="16" x2="12" y2="12"></line>
          <line x1="12" y1="8" x2="12.01" y2="8"></line>
        </svg>
        <span class="tooltip-text">Start recording before you edit document</span>
      </div>
      <button id="btn-settings" class="icon-button" type="button" aria-label="Open settings">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 8.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7Z"/>
          <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1-2 2-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6v.2h-2.9v-.2a1.7 1.7 0 0 0-1.1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1-2-2 .1-.1A1.7 1.7 0 0 0 5.2 15a1.7 1.7 0 0 0-1.6-1H3.4v-2.9h.2a1.7 1.7 0 0 0 1.6-1.1 1.7 1.7 0 0 0-.3-1.9l-.1-.1 2-2 .1.1a1.7 1.7 0 0 0 1.9.3 1.7 1.7 0 0 0 1.1-1.6v-.2h2.9v.2a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1 2 2-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.6 1.1h.2V14H21a1.7 1.7 0 0 0-1.6 1Z"/>
        </svg>
      </button>
    </header>

    <section class="score-card" aria-label="Writing originality summary">
      <div class="summary">
        <div class="leaf-mark">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19.5 4.5C11.8 4.5 6 8.9 6 15.5c0 1.1.3 2.1.8 3 1-.7 2.1-1.3 3.4-1.8 3-1.1 5.1-3 6.2-5.7-2.4 2-5.1 3-8.1 3.1 1.9-4 5.6-6.1 11.2-6.4v-3.2Z"/>
          </svg>
        </div>
        <div>
          <p class="summary-title">Your writing is <strong>mostly original</strong></p>
          <p class="summary-subtitle">AI is used lightly for editing</p>
        </div>
      </div>

      <div class="breakdown">
        <h2>Breakdown</h2>
        <div class="metric">
          <span>Own writing</span>
          <div class="bar"><span class="bar-fill bar-fill--own" id="bar-own"></span></div>
          <strong id="score-own">80%</strong>
        </div>
        <div class="metric">
          <span>AI Paraphrase</span>
          <div class="bar"><span class="bar-fill bar-fill--ai" id="bar-ai"></span></div>
          <strong id="score-ai">80%</strong>
        </div>
        <div class="metric">
          <span>External Source</span>
          <div class="bar"><span class="bar-fill bar-fill--source" id="bar-source"></span></div>
          <strong id="score-source">80%</strong>
        </div>
      </div>
    </section>

    <section class="activity-section">
      <h2>Recent Activity</h2>
      <div id="activity-list" class="activity-list"></div>
    </section>

    <button id="btn-record" class="record-button" type="button">Start recording</button>

    <button id="btn-full-log" class="log-row" type="button">
      <span class="doc-icon">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 3h7l4 4v14H7V3Z"/>
          <path d="M14 3v5h5M9 13h6M9 17h5"/>
        </svg>
      </span>
      <span>View full log</span>
      <svg class="arrow-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M5 12h14M13 6l6 6-6 6"/>
      </svg>
    </button>

    <footer class="footer">
      <div class="privacy">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="6" y="10" width="12" height="10" rx="2"/>
          <path d="M8.5 10V7.5a3.5 3.5 0 0 1 7 0V10"/>
        </svg>
        <span>Private and local</span>
      </div>
      <button id="btn-export" class="export-link" type="button">TWFF</button>
      <button id="btn-viewer" class="export-link" type="button" title="Open TWFF viewer">View</button>
      <button id="btn-floating" class="external-button" type="button" aria-label="Float panel in document">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M14 5h5v5M13 11l6-6M19 14v5H5V5h5"/>
        </svg>
      </button>
    </footer>

    <p id="notice" class="notice" hidden></p>
  </main>

  <script type="module" src="popup.js"></script>
</body>
</html>
