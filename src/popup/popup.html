<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colophon</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <span id="status-dot" class="dot dot--stopped" aria-hidden="true"></span>
      <span id="status-label">Stopped</span>
      <span class="app-name">Colophon</span>
    </header>
    <section id="stats" class="stats" hidden>
      <div class="stat">
        <span class="stat__value" id="stat-duration">0:00</span>
        <span class="stat__label">Duration</span>
      </div>
      <div class="stat">
        <span class="stat__value" id="stat-edits">0</span>
        <span class="stat__label">Edits</span>
      </div>
      <div class="stat">
        <span class="stat__value" id="stat-ai">0</span>
        <span class="stat__label">AI uses</span>
      </div>
    </section>
    <section class="actions">
      <button id="btn-toggle" class="btn btn--primary">Start recording</button>
      <button id="btn-export" class="btn btn--secondary" disabled>
        Export .twff
      </button>
    </section>
    <footer>
      <a id="link-status" href="#" role="button">Status</a>
      <!-- BUTTON TO OPEN SIDEPANEL FOR TEST. BUTTON ID BE PLACED IN ACTUAL POPUP.HTML'S "VIEW FULL LOG" BUTTON -->
      <button id="btn-view-log">Open Timeline Log</button>
      <span class="footer-sep">·</span>
      <a id="link-settings" href="#" role="button">Settings</a>
    </footer>
    <!-- JSZip is imported as an ES module inside process-log.js (service worker side).
       No script tag needed here. -->
    <script type="module" src="popup.js"></script>
  </body>
</html>
